{% extends "base.html" %}

{% block title %}Create Author{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="mb-0">Create Author</h2>

  <a href="{% url 'author_admin_list' %}" class="btn btn-outline-secondary btn-sm">
    ← Back
  </a>
</div>

<div class="list-group">
  <div class="list-group-item">

    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Name</label>
        <input
          type="text"
          name="name"
          class="form-control"
          value="{{ name|default:'' }}"
          required>
      </div>

      <div class="mb-3">
        <label class="form-label">Surname</label>
        <input
          type="text"
          name="surname"
          class="form-control"
          value="{{ surname|default:'' }}"
          required>
      </div>

      <div class="mb-3">
        <label class="form-label">Patronymic</label>
        <input
          type="text"
          name="patronymic"
          class="form-control"
          value="{{ patronymic|default:'' }}"
          required>
      </div>

      <button type="submit" class="btn btn-primary">
        Create
      </button>

    </form>

  </div>
</div>

{% endblock %}
