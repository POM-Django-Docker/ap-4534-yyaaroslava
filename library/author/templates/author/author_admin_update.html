{% extends "base.html" %}

{% block title %}Edit Author{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Edit Author</h2>

  <a href="{% url 'author_admin_list' %}" class="btn btn-secondary">
    Back
  </a>
</div>

<div class="card shadow-sm border-0">
  <div class="card-body">

    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Name</label>
        <input
          type="text"
          name="name"
          class="form-control"
          value="{{ author.name|default:'' }}">
      </div>

      <div class="mb-3">
        <label class="form-label">Surname</label>
        <input
          type="text"
          name="surname"
          class="form-control"
          value="{{ author.surname|default:'' }}">
      </div>

      <div class="mb-3">
        <label class="form-label">Patronymic</label>
        <input
          type="text"
          name="patronymic"
          class="form-control"
          value="{{ author.patronymic|default:'' }}">
      </div>

      <button type="submit" class="btn btn-primary">
        Update Author
      </button>

    </form>

  </div>
</div>

{% endblock %}
